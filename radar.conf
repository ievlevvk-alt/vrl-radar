# radar.conf - обновленная версия с комментариями

# ========================
# РАДАРНЫЕ ПАРАМЕТРЫ
# ========================

# Размер дискрета по дальности (метры)
range_bin_rbs=30.0
range_bin_uvd=60.0

# Параметры перекрытия
max_azimuth_diff_for_overlap=2
max_range_diff_for_overlap=10
min_amplitude=10

# ========================
# ПАРАМЕТРЫ АНТЕННЫ
# ========================

beamwidth_deg=5.0

# ========================
# ПАРАМЕТРЫ ОБРАБОТКИ
# ========================

max_gap_azimuth=8
range_window=30
range_tolerance=5
min_hits=2
output_file=targets.txt

# ========================
# ТРЕКЕР
# ========================

min_hits_to_confirm=3
max_coast_count=10
max_gate_distance=300.0
max_gate_azimuth=30.0
tracking_debug=false

# ========================
# RBS ЦЕЛИ
# ========================

[RBS_TARGETS]

# Цель 1: Движущаяся
name = Target_RBS_1234
azimuth_deg = 45.0
range_km = 100.0
rbs_code_octal = 01234
spi = false
enabled = true
update_every_n_revolutions = 1
revolution_offset = 0
altitude_meters = 9600
enable_altitude = true
alternate_code_altitude = true
use_linear_motion = true
speed_m_per_s = 200.0
course_deg = 225.0
initial_x_km = 75.0
initial_y_km = 129.9
end

[UVD_TARGETS]

name = Target1_UVD
azimuth_deg = 90.0
range_km = 70.0
uvd_data_dec = 74565
azimuth_speed_deg_per_rev = 0.0
range_speed_km_per_rev = 0.0
enabled = false
update_every_n_revolutions = 1
revolution_offset = 0
altitude_meters = 5000
enable_altitude = true
alternate_data_altitude = true
end

# Цель УВД с движением
name = Target_UVD_Moving
azimuth_deg = 45.0
range_km = 20.0
uvd_data_dec = 12345
enabled = true
altitude_meters = 3000
enable_altitude = true
alternate_data_altitude = true
use_linear_motion = true
speed_m_per_s = 100.0
course_deg = 45.0
initial_x_km = 14.14
initial_y_km = 14.14
use_linear_motion = true
speed_m_per_s = 200.0
course_deg = 90.0
end

[END_TARGETS]
